name: hemolens_example
description: Demo Flutter app showcasing real-time hemoglobin estimation with HemoLens.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  hemolens:
    path: ../flutter_plugin
  camera: ^0.11.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
