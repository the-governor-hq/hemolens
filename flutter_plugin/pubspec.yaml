name: hemolens
description: >-
  High-performance, offline Flutter plugin for non-invasive hemoglobin
  level estimation using Vision Transformers and on-device TFLite inference.
version: 0.1.0
homepage: https://github.com/hemolens/hemolens

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.11.0
  camera: ^0.11.0
  image: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.hemolens.hemolens
        pluginClass: HemolensPlugin
      ios:
        pluginClass: HemolensPlugin
