# HemoLens — MobileNetV4-Conv-Small Edge Configuration
# ~2.5M params → ~1 MB INT8 TFLite, <5ms on-device inference
# UIB blocks optimized for mobile NPU/DSP (Google, 2024)

# Architecture
model:
  backbone: "mobilenetv4_conv_small"   # timm model name — 2.49M params
  pretrained: true
  head:
    hidden_dim: 64                    # smaller head for smaller backbone
    dropout: 0.4                      # heavier dropout for 250 samples
  input_size: 224

# Dataset
data:
  root: "../data/processed"
  metadata_csv: "../data/processed/metadata_splits.csv"
  test_size: 0.15
  val_size: 0.15
  random_state: 42

# Augmentation — aggressive for small dataset
augmentation:
  train:
    random_crop: 224
    horizontal_flip: 0.5
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.2
      hue: 0.08
    random_rotation: 20
    random_erasing: 0.15             # CutOut-style regularization
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
  val:
    resize: 256
    center_crop: 224
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# Training — small-data regime
training:
  epochs: 80
  batch_size: 16                     # smaller batch for 525 train samples
  learning_rate: 3.0e-4              # higher LR for MobileNet fine-tuning
  weight_decay: 1.0e-3               # stronger regularization
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping_patience: 15
  gradient_clip_norm: 1.0

  # Progressive unfreezing (edge-specific)
  freeze_backbone_epochs: 5          # train head only for first N epochs
  unfreeze_lr_factor: 0.1            # backbone LR = base LR × factor

  # Label smoothing for regression (adds noise to targets during training)
  label_noise_std: 0.1               # ±0.1 g/dL Gaussian noise on Hb labels

# Loss
loss:
  type: "huber"
  delta: 1.5                         # wider delta — more tolerant of outliers

# Logging
logging:
  save_dir: "checkpoints"
  log_interval: 10
  use_wandb: false
  project_name: "hemolens-edge"
